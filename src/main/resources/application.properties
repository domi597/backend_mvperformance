spring.application.name=${APP_NAME}
server.port=${APP_PORT}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
logging.level.org.springframework=INFO

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS}

# Mail (SMTP) - Zugangsdaten kommen aus der .env
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Verhindert, dass Actuator st?ndig im Hintergrund eine Testverbindung zum Mailserver aufbaut
management.health.mail.enabled=false

# Nur den Health-Endpoint oeffentlich exponieren (keine Env-Variablen, Beans, Metriken etc.)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Absenderadresse f?r automatische Terminbest?tigungen
app.mail.from=${MAIL_FROM}
app.mail.from-name=${MAIL_FROM_NAME}

# Basis-URL des Frontends, um daraus den Passwort-Reset-Link zu bauen (z. B. https://mvperformence.at)
app.frontend.url=${FRONTEND_URL:http://localhost:5173}